name: Corrigir destaque dos cards

on:
  push:
    branches:
      - agent/corrige-destaque-cards
    paths:
      - .github/workflows/fix-featured-card-grid.yml

permissions:
  contents: write

jobs:
  fix-grid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Corrigir hierarquia visual dos cards
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("final.css")
          css = path.read_text(encoding="utf-8")

          replacements = [
              (
                  ".project-grid {\n  grid-template-columns: repeat(2, minmax(0, 1fr));\n}\n\n.project-card.featured {\n  grid-column: span 1;\n}",
                  ".project-grid {\n  grid-template-columns: repeat(3, minmax(0, 1fr));\n}\n\n.project-card.featured {\n  grid-column: span 2;\n}",
              ),
              (
                  "@media (max-width: 960px) {\n  .experience-layout {\n    grid-template-columns: 1fr;\n    gap: 28px;\n  }\n\n  .project-card.featured {\n    grid-column: span 1;\n  }\n}",
                  "@media (max-width: 960px) {\n  .experience-layout {\n    grid-template-columns: 1fr;\n    gap: 28px;\n  }\n\n  .project-grid {\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n  }\n\n  .project-card.featured {\n    grid-column: span 2;\n  }\n}",
              ),
              (
                  "  .project-grid {\n    grid-template-columns: 1fr;\n  }\n\n  .projects-toggle {",
                  "  .project-grid {\n    grid-template-columns: 1fr;\n  }\n\n  .project-card.featured {\n    grid-column: span 1;\n  }\n\n  .projects-toggle {",
              ),
          ]

          for old, new in replacements:
              if old not in css:
                  raise RuntimeError(f"Trecho CSS esperado não encontrado: {old[:60]}")
              css = css.replace(old, new, 1)

          path.write_text(css, encoding="utf-8")
          PY

      - name: Validar CSS
        run: |
          git diff --check
          grep -q "grid-template-columns: repeat(3, minmax(0, 1fr));" final.css
          grep -q "grid-column: span 2;" final.css

      - name: Commitar correção
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add final.css
          git commit -m "Corrige hierarquia visual dos cards prioritários"
          git push