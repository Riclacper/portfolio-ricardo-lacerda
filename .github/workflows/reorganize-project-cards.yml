name: Reorganizar cards do portfólio

on:
  push:
    branches:
      - agent/reorganiza-cards-recrutadores
    paths:
      - .github/workflows/reorganize-project-cards.yml

permissions:
  contents: write

jobs:
  reorganize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reorganizar projetos por relevância
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")

          grid_pattern = re.compile(
              r'(?P<open>        <div class="project-grid">\n)'
              r'(?P<cards>.*?)'
              r'(?P<close>        </div>\n      </section>)',
              re.DOTALL,
          )
          match = grid_pattern.search(index)
          if not match:
              raise RuntimeError("Grade de projetos não localizada")

          article_pattern = re.compile(
              r'          <article class="project-card(?: featured)?" data-tags="[^"]+">.*?'
              r'          </article>',
              re.DOTALL,
          )
          articles = article_pattern.findall(match.group("cards"))

          cards = {}
          for article in articles:
              title_match = re.search(r'<h3>(.*?)</h3>', article)
              if not title_match:
                  raise RuntimeError("Card sem título localizado")
              cards[title_match.group(1).strip()] = article

          order = [
              "iCanada Gestão",
              "Emprega Safe",
              "iCanada Reparos",
              "Data Science Dashboard",
              "AutoWash Smart",
              "Aurora Stay Iceland",
              "Cinescope Catalog",
              "Gerenciamento Forense",
              "Cadastro de Obras",
          ]
          featured = {
              "iCanada Gestão",
              "Data Science Dashboard",
              "AutoWash Smart",
          }

          missing = [title for title in order if title not in cards]
          if missing:
              raise RuntimeError(f"Cards não localizados: {missing}")
          if len(cards) != len(order):
              extras = sorted(set(cards) - set(order))
              raise RuntimeError(f"Lista de projetos divergente. Extras: {extras}")

          arranged = []
          for title in order:
              article = cards[title]
              class_name = "project-card featured" if title in featured else "project-card"
              article = re.sub(
                  r'class="project-card(?: featured)?"',
                  f'class="{class_name}"',
                  article,
                  count=1,
              )
              arranged.append(article)

          new_grid = match.group("open") + "\n\n".join(arranged) + "\n" + match.group("close")
          index = index[:match.start()] + new_grid + index[match.end():]
          index_path.write_text(index, encoding="utf-8")

          script_path = Path("script.js")
          script = script_path.read_text(encoding="utf-8")
          script, removed_functions = re.subn(
              r'\nconst setupProjectOrder = \(\) => \{.*?\n\};\n',
              "\n",
              script,
              count=1,
              flags=re.DOTALL,
          )
          if removed_functions != 1:
              raise RuntimeError("Função antiga de reordenação não localizada")

          script, removed_calls = re.subn(
              r'^setupProjectOrder\(\);\n',
              "",
              script,
              count=1,
              flags=re.MULTILINE,
          )
          if removed_calls != 1:
              raise RuntimeError("Chamada antiga de reordenação não localizada")

          script_path.write_text(script, encoding="utf-8")
          PY

      - name: Validar hierarquia visual
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index = Path("index.html").read_text(encoding="utf-8")
          grid = index.split('<div class="project-grid">', 1)[1].split('</div>\n      </section>', 1)[0]
          titles = re.findall(r'<h3>(.*?)</h3>', grid)
          expected = [
              "iCanada Gestão",
              "Emprega Safe",
              "iCanada Reparos",
              "Data Science Dashboard",
              "AutoWash Smart",
              "Aurora Stay Iceland",
              "Cinescope Catalog",
              "Gerenciamento Forense",
              "Cadastro de Obras",
          ]
          if titles != expected:
              raise SystemExit(f"Ordem incorreta: {titles}")

          featured = re.findall(
              r'<article class="project-card featured"[^>]*>.*?<h3>(.*?)</h3>',
              grid,
              re.DOTALL,
          )
          if featured != ["iCanada Gestão", "Data Science Dashboard", "AutoWash Smart"]:
              raise SystemExit(f"Destaques incorretos: {featured}")

          script = Path("script.js").read_text(encoding="utf-8")
          if "setupProjectOrder" in script:
              raise SystemExit("Reordenação dinâmica antiga ainda está presente")
          PY
          git diff --check

      - name: Commitar reorganização
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html script.js
          git commit -m "Reorganiza projetos por relevância para recrutadores"
          git push
