name: Padronizar card do Data Science Dashboard

on:
  push:
    branches:
      - agent/atualiza-data-science-dashboard
    paths:
      - .github/workflows/update-dashboard-card.yml

permissions:
  contents: write

jobs:
  format-portfolio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Padronizar HTML do card
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")

          pattern = re.compile(
              r'          <article class="project-card featured" data-tags="online sistema">\s*'
              r'<div class="project-topline">\s*'
              r'<span>Flask \+ PostgreSQL \+ Machine Learning</span>.*?'
              r'</article>',
              re.DOTALL,
          )

          lines = [
              '          <article class="project-card featured" data-tags="online sistema">',
              '            <div class="project-topline">',
              '              <span>Flask + PostgreSQL + Machine Learning</span>',
              '              <strong>Demo online</strong>',
              '            </div>',
              '            <h3>Data Science Dashboard</h3>',
              '            <p>',
              '              Dashboard full stack para análise exploratória e classificação de',
              '              ocorrências sintéticas, com API Flask, PostgreSQL/Supabase e pipeline',
              '              de machine learning publicado em produção.',
              '            </p>',
              '            <ul>',
              '              <li>Filtros combináveis, indicadores, gráficos, tabela paginada e exportação CSV.</li>',
              '              <li>Modelo scikit-learn com métricas, importância das variáveis e matriz de confusão.</li>',
              '              <li>Frontend responsivo, API no Render, CI automatizado e documentação técnica.</li>',
              '            </ul>',
              '            <div class="project-actions">',
              '              <a',
              '                href="https://data-science-dashboard-vafr.onrender.com/"',
              '                target="_blank"',
              '                rel="noreferrer"',
              '              >',
              '                Acessar dashboard',
              '              </a>',
              '              <a',
              '                href="https://github.com/Riclacper/data-Science-Dashboard"',
              '                target="_blank"',
              '                rel="noreferrer"',
              '              >',
              '                GitHub',
              '              </a>',
              '            </div>',
              '          </article>',
          ]
          card = "\n".join(lines)

          index, replacements = pattern.subn(card, index, count=1)
          if replacements != 1:
              raise RuntimeError("Card atualizado não localizado de forma única")

          index_path.write_text(index, encoding="utf-8")
          PY

      - name: Validar alterações
        run: |
          git diff --check
          grep -q "https://data-science-dashboard-vafr.onrender.com/" index.html

      - name: Commitar formatação
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Padroniza card do Data Science Dashboard"
          git push
